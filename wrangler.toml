name = "dairo-status"
main = "src/index.tsx"
compatibility_date = "2026-06-01"
compatibility_flags = ["nodejs_compat"]

# Static assets (compiled Tailwind CSS, favicon, icons) served straight from the edge.
assets = { directory = "./public", binding = "ASSETS" }

# D1 — the status datastore. database_id is filled in after `wrangler d1 create dairo-status`.
[[d1_databases]]
binding = "DB"
database_name = "dairo-status"
database_id = "82b2dee4-6734-4d40-b349-b75860bf29b5"

[vars]
PAGE_SLUG = "status"
PUBLIC_URL = "https://status.dairo.app"
UPTIME_DAYS = "45"
# The Dairo inbox subscriber mail is sent FROM (status@dairo.app). Not a secret.
DAIRO_STATUS_INBOX_ID = "eab7f064-80a1-4c1a-9c3e-b98095a8037b"

# Secrets (set via `wrangler secret put`): INGEST_TOKEN (checker auth), DAIRO_API_KEY (email send).

# Subscriber mail goes to the Dairo API (api.dairo.app/v1/messages). That host is a
# Cloudflare-proxied CNAME to a DIFFERENT Cloudflare account (Supabase), so a direct
# Worker subrequest is rejected with Cloudflare error 1014 (CNAME cross-user banned) —
# every notification silently failed. We instead call the Dairo edge worker (same
# account) through a service binding: it runs in-network (no DNS, no 1014, no Access
# redirect) and injects the origin's CF-Access token + edge secret itself.
[[services]]
binding = "DAIRO_EDGE"
service = "dairo-edge"

[observability]
enabled = true
